# Production stack for Cadence API.
# Deploys via Portainer as a stack; secrets injected via Portainer's UI.
# See ../DEPLOY.md for the full runbook.

services:
  postgres:
    image: postgres:17-alpine
    container_name: cadence-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: cadence
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: cadence
    volumes:
      - cadence-pgdata:/var/lib/postgresql/data
    networks:
      - cadence-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cadence -d cadence"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  cadence-api:
    # CADENCE_IMAGE in .env should stay at :latest. CI pushes both a
    # :<short-sha> tag and :latest on every successful build, and the
    # SSH-deploy forced command only runs `docker compose pull cadence-api`
    # — which respects whatever tag .env points at. Pinning .env to a
    # specific SHA silently freezes prod regardless of what CI ships.
    # If you need to roll back, swap .env to a known-good :<sha> tag
    # manually and re-run the pull. See ../DEPLOY.md.
    image: ${CADENCE_IMAGE:-ghcr.io/rohithgilla12/cadence-api:latest}
    container_name: cadence-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: "8080"
      CADENCE_ENV: production
      DATABASE_URL: postgres://cadence:${POSTGRES_PASSWORD}@postgres:5432/cadence?sslmode=disable
      FIREBASE_CREDENTIALS: /etc/cadence/firebase-admin.json
      SENTRY_DSN: ${SENTRY_DSN:-}
      # Strava integration (PRD §9). All five must be set together; if any
      # is empty the API still boots but the Strava routes 503. See
      # ../DEPLOY.md §4b for one-time app registration + webhook subscribe.
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}
      STRAVA_CLIENT_ID: ${STRAVA_CLIENT_ID:-}
      STRAVA_CLIENT_SECRET: ${STRAVA_CLIENT_SECRET:-}
      STRAVA_TOKEN_ENCRYPTION_KEY: ${STRAVA_TOKEN_ENCRYPTION_KEY:-}
      STRAVA_WEBHOOK_VERIFY_TOKEN: ${STRAVA_WEBHOOK_VERIFY_TOKEN:-}
    volumes:
      # Bind-mount the Firebase service account JSON from the host. Path on
      # the VPS is documented in DEPLOY.md.
      - ${FIREBASE_CREDENTIALS_HOST_PATH:?FIREBASE_CREDENTIALS_HOST_PATH is required}:/etc/cadence/firebase-admin.json:ro
    networks:
      - cadence-internal

  # Background correlation engine. Same image as cadence-api but ENTRYPOINT
  # is /app/worker which starts robfig/cron and stays up. Reads habit_logs +
  # daily_summaries + check_ins, computes correlations, upserts insights.
  # No inbound ports — pure DB consumer + producer.
  cadence-worker:
    image: ${CADENCE_IMAGE:-ghcr.io/rohithgilla12/cadence-api:latest}
    container_name: cadence-worker
    restart: unless-stopped
    entrypoint: ["/app/worker"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      CADENCE_ENV: production
      DATABASE_URL: postgres://cadence:${POSTGRES_PASSWORD}@postgres:5432/cadence?sslmode=disable
      # Override the default 3am UTC schedule via Portainer env if needed.
      CRON_SPEC: ${CRON_SPEC:-0 3 * * *}
      SENTRY_DSN: ${SENTRY_DSN:-}
    networks:
      - cadence-internal

  # Marketing landing page served from a host bind mount. The HTML lives in
  # the repo at landing/; CI pulls it onto the VPS via the same git-sync
  # path Portainer uses for the compose file. Cloudflare Tunnel routes
  # cadence.gilla.fun → http://cadence-landing:80 via the Zero Trust
  # dashboard (no config-file).
  cadence-landing:
    image: nginx:1.27-alpine
    container_name: cadence-landing
    restart: unless-stopped
    volumes:
      - ${LANDING_PATH:-/opt/cadence/landing}:/usr/share/nginx/html:ro
      # Custom nginx config: clean URLs (/privacy, /terms) without the
      # default trailing-slash 301 that emits http:// behind the tunnel.
      - ${LANDING_PATH:-/opt/cadence/landing}/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - cadence-internal

  # Outbound-only tunnel — no inbound ports opened on the VPS. Token mode
  # means tunnel routing is configured in the Cloudflare Zero Trust dashboard
  # (api.cadence.gilla.fun -> http://cadence-api:8080), not in a config file.
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cadence-cloudflared
    restart: unless-stopped
    depends_on:
      - cadence-api
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARED_TUNNEL_TOKEN:?CLOUDFLARED_TUNNEL_TOKEN is required}
    networks:
      - cadence-internal

volumes:
  cadence-pgdata:
    name: cadence-pgdata

networks:
  cadence-internal:
    name: cadence-internal
    driver: bridge
