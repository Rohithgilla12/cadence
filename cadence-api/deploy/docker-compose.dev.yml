services:
  postgres:
    image: postgres:17-alpine
    container_name: cadence-postgres-dev
    environment:
      POSTGRES_USER: cadence
      POSTGRES_PASSWORD: cadence
      POSTGRES_DB: cadence
    ports:
      - "5433:5432"   # 5433 host → 5432 container, avoids collision with any local pg
    volumes:
      - cadence-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cadence -d cadence"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  cadence-pgdata:
