# Custom nginx config for the cadence-landing container. Bind-mounted at
# /etc/nginx/conf.d/default.conf so the page tree can use clean URLs like
# /privacy and /terms without nginx emitting an HTTP 301 to the http://
# scheme — which it would by default behind Cloudflare Tunnel, because the
# tunnel terminates TLS at Cloudflare and forwards plain HTTP inward.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Don't emit absolute redirects with an `http://` scheme. Cloudflare
    # would re-upgrade them but the round-trip is ugly and breaks HSTS
    # checkers. Relative redirects preserve the client's original scheme.
    absolute_redirect off;
    port_in_redirect off;
    server_tokens off;

    # try_files keeps clean URLs working: /privacy → /privacy/index.html
    # in one hop, no 301 trailing-slash dance.
    location / {
        try_files $uri $uri/index.html $uri/ =404;
    }

    # Circle invite URLs of the shape /circle/join/<token>. The token is
    # opaque to nginx; the page is a single static index.html that reads
    # the token out of the URL with JS and renders an install + paste
    # flow. /circle/join with no token also lands here and renders an
    # "invalid invite" state. Once iOS / Android Universal Links are
    # live, the OS intercepts these URLs before they ever reach nginx.
    location /circle/join {
        try_files $uri /circle/join/index.html;
    }

    # Apple App Site Association — required by iOS for Universal Links.
    # Must be served as application/json with no extension. Apple caches
    # aggressively on the CDN side; no-cache here lets us iterate while
    # bringing the integration up.
    location = /.well-known/apple-app-site-association {
        default_type application/json;
        add_header Cache-Control "no-cache";
    }

    # Android App Links verification. Same content-type expectation as
    # Apple's file. Google's verifier hits this once at install time.
    location = /.well-known/assetlinks.json {
        default_type application/json;
        add_header Cache-Control "no-cache";
    }

    # Cache static assets aggressively — the page tree is regenerated on
    # the host and synced via rsync, so a long max-age is fine.
    location ~* \.(css|js|svg|png|jpg|jpeg|webp|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    # Sensible defaults.
    location = /favicon.ico { log_not_found off; access_log off; }
    location = /robots.txt  { log_not_found off; access_log off; }
}
